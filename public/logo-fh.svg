<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d5a27"/>
      <stop offset="100%" stop-color="#1a3a15"/>
    </linearGradient>
    <linearGradient id="fh-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d4e8d0"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.2)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.05)"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#bg-grad)"/>
  <rect width="200" height="200" rx="40" fill="url(#shine)"/>
  <rect x="4" y="4" width="192" height="192" rx="36" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
  <text x="100" y="92" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="url(#fh-grad)" text-anchor="middle" letter-spacing="-2">FH</text>
  <text x="100" y="138" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500" fill="#a8c8a0" text-anchor="middle" letter-spacing="6">FOREST HAVEN</text>
